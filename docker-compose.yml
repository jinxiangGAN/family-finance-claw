services:
  bot:
    build: .
    container_name: family-finance-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Persist SQLite database on host
      - ./data:/app/data
      # Persist Codex auth/config/runtime state on host
      - ./codex-home:/codex-home
    environment:
      - DATABASE_PATH=/app/data/expenses.db
      - CODEX_HOME=/codex-home
      - CODEX_WORKDIR=/app
